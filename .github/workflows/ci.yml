name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  mappings-sync:
    name: Verify shared mappings are in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Check mapping files
        run: node tools/sync-mappings/sync.mjs --check

  test-js:
    name: Test JS (coverage)
    runs-on: ubuntu-latest
    needs: mappings-sync
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: node tools/sync-mappings/sync.mjs
      - run: pnpm run build
      - run: node packages/js/all/test/mapping-coverage.test.mjs

  test-go:
    name: Test Go (coverage)
    runs-on: ubuntu-latest
    needs: mappings-sync
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.24' }
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: node tools/sync-mappings/sync.mjs
      - run: go test ./...
        working-directory: packages/go
