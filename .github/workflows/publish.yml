name: Publish

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write # changesets/action: push version commit / tags, create GitHub Releases
  pull-requests: write # changesets/action: create/update the "Version Packages" PR
  id-token: write # npm trusted publishing (OIDC) + provenance attestation

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v3
        with: { version: 9 }

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # Trusted publishing (OIDC) requires npm >= 11.5.1, but Node 20 bundles npm 10.x.
      # `pnpm publish` (invoked by `changeset publish`) delegates the actual registry
      # upload to the npm CLI on PATH, so upgrading the global npm is what enables OIDC.
      # npm 12 is intentionally avoided until it matures.
      - run: npm install -g npm@^11.5.1

      - run: pnpm install --frozen-lockfile

      - run: node tools/sync-mappings/sync.mjs

      - run: pnpm run build

      # Authentication (primary → fallback):
      #   1. npm trusted publishing (OIDC) — PRIMARY. No secret required. Each package
      #      must have this repo + this workflow file registered as a trusted publisher
      #      on npmjs.com (one-time manual setup, see PUBLISHING.md).
      #   2. NPM_TOKEN secret (granular automation token) — FALLBACK. If the secret is
      #      set, changesets/action writes it to ~/.npmrc and token auth takes
      #      precedence over OIDC. Leave the secret unset to use trusted publishing.
      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Attach provenance attestations to published packages (works with both
          # OIDC and token auth thanks to `id-token: write` above).
          NPM_CONFIG_PROVENANCE: "true"
